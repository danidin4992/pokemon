<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎴 Pokemon Auctions</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>🎴 Pokemon Auctions</h1>
      <div class="header-actions">
        <span id="last-run" class="muted">—</span>
        <span id="ebay-usage" class="ebay-usage" title="eBay Browse API calls today"></span>
        <div id="recipient-picker" class="recipient-picker"></div>
        <button id="toggle-help" class="secondary" title="Grading grades reference">📖 עזר</button>
        <button id="toggle-settings" class="secondary" title="Global keyword filters">⚙ Filters</button>
        <button id="run-now" class="primary">Run now</button>
        <button id="send-email" class="secondary">Email digest</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="settings-panel" hidden>
      <div class="panel">
        <h2>Global keyword filters</h2>
        <p class="hint">Applied to every search. Case-insensitive, word-boundary match. Per-search keywords (edit below) apply in addition.</p>
        <div class="setting-row">
          <label>Required <span class="hint-inline">(title must contain at least one) · press Enter to add</span></label>
          <div id="global-required" class="tag-input"></div>
        </div>
        <div class="setting-row">
          <label>Forbidden <span class="hint-inline">(title must contain none) · press Enter to add</span></label>
          <div id="global-forbidden" class="tag-input forbidden"></div>
        </div>
        <button id="save-settings" class="primary">Save filters</button>
      </div>
    </section>

    <div class="two-col">
      <aside id="searches-section">
        <div class="aside-head">
          <h2>Watched cards</h2>
          <button type="button" id="add-card-btn" class="primary btn-sm" title="Add a new card">+ Add</button>
        </div>
        <div id="searches-list" class="cards-grid"></div>
      </aside>

      <section id="listings-section">
        <div class="section-head">
          <h2>Active auctions</h2>
          <div class="filters">
            <label><input type="checkbox" id="filter-24h" checked> Ending in 24h</label>
            <label><input type="checkbox" id="filter-below-market"> 🟢 Below market only</label>
            <select id="filter-search">
              <option value="">All searches</option>
            </select>
            <button id="filter-clear" type="button" class="secondary filter-clear" style="display:none">✕ Clear</button>
          </div>
        </div>
        <div id="listings-list"></div>
      </section>

    </div>
  </main>

  <div id="help-modal" class="modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-panel">
      <iframe id="help-iframe" src="/help.html" title="Grading reference"></iframe>
      <div class="modal-foot">
        <button type="button" class="primary" data-modal-close>סגור</button>
      </div>
    </div>
  </div>

  <div id="edit-drawer" class="drawer" hidden>
    <div class="drawer-backdrop" data-drawer-close></div>
    <div class="drawer-panel" role="dialog" aria-label="Edit card">
      <div class="drawer-head">
        <h2 id="drawer-title">Edit card</h2>
        <button type="button" class="drawer-close" data-drawer-close aria-label="Close">✕</button>
      </div>
      <div class="drawer-body" id="drawer-body"></div>
      <div class="drawer-foot">
        <button type="button" class="secondary" data-drawer-close>Cancel</button>
        <button type="button" class="primary" id="drawer-save">Save changes</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
